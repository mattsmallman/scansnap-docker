  # Add this to your services: section
  scansnap:
    build: scansnap-docker
    container_name: scansnap
    restart: unless-stopped
    devices:
      - /dev/bus/usb/003/002:/dev/bus/usb/003/002
    volumes:
      - ./consume:/output
    environment:
      - RESOLUTION=300
      - MODE=Color
      - SOURCE=ADF Duplex
    labels:
      - com.centurylinklabs.watchtower.enable="true"
    networks:
      - internal
