services:
  scansnap:
    build: .
    container_name: scansnap
    restart: unless-stopped
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - ${CONSUME_PATH:-./consume}:/output
    device_cgroup_rules:
      - 'c 189:* rmw'
    environment:
      - RESOLUTION=${RESOLUTION:-300}
      - MODE=${MODE:-Color}
      - SOURCE=${SOURCE:-ADF Duplex}
      - POLL_INTERVAL=${POLL_INTERVAL:-0.5}
      - DEBOUNCE=${DEBOUNCE:-3}
